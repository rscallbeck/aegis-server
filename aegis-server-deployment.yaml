apiVersion: apps/v1
kind: Deployment
metadata:
  name: aegis-server
  namespace: aegis-casino
  labels:
    app: aegis-server
spec:
  replicas: 1 
  selector:
    matchLabels:
      app: aegis-server
  template:
    metadata:
      labels:
        app: aegis-server
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
      - name: server
        image: aegis-server:__VERSION__
        ports:
        - containerPort: 3001
        envFrom:
        - secretRef:
            name: aegis-server-env
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            cpu: "500m"
            memory: "512Mi"
        imagePullPolicy: IfNotPresent
        volumeMounts:
          - name: tls-certs
            mountPath: "/usr/src/certificates"
            readOnly: true
      volumes:
      - name: tls-certs
        secret:
          secretName: aegis-server-tls # You will create this secret with your certs
---
apiVersion: v1
kind: Service
metadata:
  name: aegis-server-svc
  namespace: aegis-casino
spec:
  type: NodePort
  ports:
  - port: 3001
    targetPort: 3001
    nodePort: 30001
  selector:
    app: aegis-server
