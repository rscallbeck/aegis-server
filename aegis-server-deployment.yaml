apiVersion: apps/v1
kind: Deployment
metadata:
  name: aegis-server
  namespace: aegis-casino
  labels:
    app: aegis-server
spec:
  replicas: 2 # Run 2 instances for high availability
  selector:
    matchLabels:
      app: aegis-server
  template:
    metadata:
      labels:
        app: aegis-server
    spec:
      # Security Context to enforce non-root execution at the Pod level
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
      - name: aegis-server
        image: your-docker-registry/aegis-server:latest # Update with your image tag
        imagePullPolicy: Always
        ports:
        - containerPort: 3001
        envFrom:
        - secretRef:
            name: aegis-server-env # Pulls in the Supabase keys from Step 2
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: tls-certs
          mountPath: "/usr/src/app/certificates"
          readOnly: true
      volumes:
      - name: tls-certs
        secret:
          secretName: aegis-server-tls # You will create this secret with your certs
  