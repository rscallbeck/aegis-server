apiVersion: apps/v1
kind: Deployment
metadata:
  name: aegis-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aegis-server
  template:
    metadata:
      labels:
        app: aegis-server
    spec:
      containers:
      - name: server
        image: aegis-server:latest
        ports:
        - containerPort: 3001
        envFrom:
        - secretRef:
            name: aegis-secrets # Contains Supabase & VRF keys
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: aegis-server-svc
spec:
  ports:
  - port: 3001
    targetPort: 3001
  selector:
    app: aegis-server
    